<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Vehicle</title>
</head>
<body>
<div class="card p-4">
    <h4>Manage Vehicles</h4>
    <form id="vehicleForm">
        <input type="hidden" id="vehicleId">
        <div class="row">
            <div class="col-md-4">
                <input type="text" id="vNo" class="form-control" placeholder="Vehicle No (e.g. CAB-1234)" required>
            </div>
            <div class="col-md-4">
                <input type="text" id="vModel" class="form-control" placeholder="Model" required>
            </div>
            <div class="col-md-4">
                <button type="button" class="btn btn-success" onclick="saveVehicle()">Save Vehicle</button>
                <button type="reset" class="btn btn-secondary" onclick="resetVehicleForm()">Reset</button>
            </div>
        </div>
    </form>
    <table class="table mt-4">
        <thead>
        <tr><th>Vehicle No</th><th>Model</th><th>Actions</th></tr>
        </thead>
        <tbody id="vehicleTableBody"></tbody>
    </table>
</div>
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="app.js"></script>

</body>
</html>
