<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <title>Admin - Policy Management</title>
</head>
<body>
<div class="d-flex">
    <main class="p-4 w-100">
        <h4>Policy Application Workflow</h4>
        <div class="card mt-3">
            <div class="card-header bg-primary text-white">Pending Approvals</div>
            <div class="card-body">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Policy No</th>
                        <th>Customer</th>
                        <th>Vehicle No</th>
                        <th>Premium (LKR)</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody id="adminPolicyTable"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
