<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Payments</title>
</head>
<body>
<div class="card p-4">
    <h4>Payments & Billing</h4>
    <div class="row">
        <div class="col-md-8">
            <h5>Upcoming Dues</h5>
            <table class="table">
                <thead>
                <tr>
                    <th>Policy</th>
                    <th>Due Date</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="duePaymentsTable">
                </tbody>
            </table>
        </div>
        <div class="col-md-4">
            <div class="card bg-light p-3">
                <h6>Payment Method</h6>
                <p class="small text-muted">Safe & Secure encrypted payments[cite: 20].</p>
                <hr>
                <button class="btn btn-outline-primary w-100 mb-2">Pay via Card</button>
                <button class="btn btn-outline-dark w-100">Pay via Bank Transfer</button>
            </div>
        </div>
    </div>
</div>
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>

</body>
</html>
