<!DOCTYPE html>
<html>
<head>
    <title>VIMS - Welcome</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #1557b0; }
        .toggle-link { color: #1a73e8; cursor: pointer; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="auth-card">
    <h2>VIMS Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn">Login</button>
    </form>
    <p>New user? <a href="#" class="toggle-link">Register Vehicle Profile</a></p>
</div>
<script src="../js/jQuery.js"></script>

    async function login() {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: 'user1', password: 'password'})
        });
        const data = await res.json();
        if(res.ok) {
            localStorage.setItem('token', data.token); // JWT eka browser eke save karanawa
            localStorage.setItem('role', data.role);
        }
    }
</script>
