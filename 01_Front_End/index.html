<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>VehicleMS — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0b0f1a;
            --surface:  #111827;
            --border:   #1e2d45;
            --accent:   #3b82f6;
            --accent2:  #06b6d4;
            --text:     #f1f5f9;
            --muted:    #64748b;
            --danger:   #f87171;
            --radius:   14px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated background grid ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }
        @keyframes gridMove { to { background-position: 48px 48px; } }

        /* ── Glow orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }
        .orb1 { width: 500px; height: 500px; background: rgba(59,130,246,.15); top: -150px; left: -100px; animation-delay: 0s; }
        .orb2 { width: 400px; height: 400px; background: rgba(6,182,212,.1);  bottom: -100px; right: -80px; animation-delay: 3s; }
        @keyframes float {
            0%,100% { transform: translateY(0) scale(1); }
            50%      { transform: translateY(-30px) scale(1.05); }
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 52px 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
            animation: slideUp .6s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo / Brand ── */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
        }
        .brand-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .brand-name span { color: var(--accent); }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 36px;
            font-weight: 300;
        }

        /* ── Form ── */
        .field { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .input-wrap { position: relative; }
        .input-wrap .icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 16px;
            pointer-events: none;
        }
        input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: rgba(255,255,255,.04);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        input:focus {
            border-color: var(--accent);
            background: rgba(59,130,246,.05);
            box-shadow: 0 0 0 3px rgba(59,130,246,.15);
        }
        input::placeholder { color: var(--muted); }

        /* ── Error msg ── */
        .error-msg {
            display: none;
            background: rgba(248,113,113,.1);
            border: 1px solid rgba(248,113,113,.3);
            color: var(--danger);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            animation: shake .4s ease;
        }
        .error-msg.show { display: flex; align-items: center; gap: 8px; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-6px); }
            75%      { transform: translateX(6px); }
        }

        /* ── Button ── */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: .04em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: opacity .2s, transform .15s;
            margin-top: 8px;
        }
        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background .2s;
        }
        .btn-login:hover { opacity: .92; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:hover::after { background: rgba(255,255,255,.06); }
        .btn-login.loading { pointer-events: none; opacity: .7; }

        /* ── Spinner inside button ── */
        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }

        /* ── Footer ── */
        .footer-note {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
    <div class="brand">
        <div class="brand-icon">🚗</div>
        <div class="brand-name">Vehicle<span>MS</span></div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your management portal</p>

    <div class="error-msg" id="errorMsg">
        <span>⚠</span>
        <span id="errorText">Invalid username or password.</span>
    </div>

    <div class="field">
        <label>Username</label>
        <div class="input-wrap">
            <span class="icon">👤</span>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
        </div>
    </div>

    <div class="field">
        <label>Password</label>
        <div class="input-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Sign In →</span>
        <div class="spinner"></div>
    </button>

    <p class="footer-note">Vehicle Management System &copy; 2025</p>
</div>

<script>
    // Enter key support
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });

    function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn      = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorTxt = document.getElementById('errorText');

        errorMsg.classList.remove('show');

        if (!username || !password) {
            errorTxt.textContent = 'Please fill in both fields.';
            errorMsg.classList.add('show');
            return;
        }

        // Loading state
        btn.classList.add('loading');

        // ── Simulate auth (replace with real API call) ──
        setTimeout(() => {
            btn.classList.remove('loading');

            // Demo credentials — admin/admin1234
            if (username === 'admin' && password === '1234') {
                window.location.replace('dashboard.html');
            } else {
                errorTxt.textContent = 'Invalid username or password.';
                errorMsg.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }, 900);
    }
</script>
</body>
</html>
