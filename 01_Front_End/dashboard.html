<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>VehicleMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#f5f6fa;--white:#fff;--border:#e8eaed;
            --text:#1a1d23;--muted:#6b7280;
            --accent:#2563eb;--accent-lt:#eff6ff;
            --red:#ef4444;--red-lt:#fef2f2;
            --green:#16a34a;--amber:#d97706;
            --r:10px;
        }
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
        .layout{display:flex;min-height:100vh}

        /* Sidebar */
        .sidebar{width:210px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 10px;position:fixed;top:0;left:0;bottom:0;z-index:10}
        .logo{display:flex;align-items:center;gap:8px;padding:2px 8px 18px;border-bottom:1px solid var(--border);margin-bottom:14px}
        .logo-ico{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
        .logo-txt{font-weight:700;font-size:15px}
        .nav{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
        .nav:hover{background:var(--bg);color:var(--text)}
        .nav.on{background:var(--accent-lt);color:var(--accent)}
        .nav svg{width:15px;height:15px;flex-shrink:0}
        .sb-bot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border)}
        .urow{display:flex;align-items:center;gap:8px;padding:8px 10px}
        .ava{width:28px;height:28px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
        .uname{font-size:13px;font-weight:600}
        .urole{font-size:11px;color:var(--muted)}
        .logout{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--red);background:none;border:none;cursor:pointer;width:100%;transition:background .15s}
        .logout:hover{background:var(--red-lt)}
        .logout svg{width:14px;height:14px}

        /* Main */
        .main{margin-left:210px;flex:1;display:flex;flex-direction:column}
        .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
        .ptitle{font-size:15px;font-weight:700}
        .tright{display:flex;gap:8px}

        .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
        .btn svg{width:13px;height:13px}
        .bp{background:var(--accent);color:#fff}.bp:hover{background:#1d4ed8}
        .bo{background:var(--white);color:var(--text);border:1px solid var(--border)}.bo:hover{background:var(--bg)}
        .bsm{padding:5px 11px;font-size:12px;border-radius:7px}
        .be{background:var(--accent-lt);color:var(--accent);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:600;transition:background .15s}.be:hover{background:#dbeafe}
        .bd{background:var(--red-lt);color:var(--red);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:600;transition:background .15s}.bd:hover{background:#fee2e2}
        .be svg,.bd svg{width:11px;height:11px}

        .content{padding:22px 26px}

        /* Stats */
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
        .stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
        .slbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
        .sval{font-size:24px;font-weight:700;line-height:1}
        .ssub{font-size:11px;color:var(--muted);margin-top:3px}
        .blue .sval{color:var(--accent)}.grn .sval{color:var(--green)}.amb .sval{color:var(--amber)}.red .sval{color:var(--red)}

        /* Card */
        .card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
        .card-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
        .card-title{font-size:14px;font-weight:700}
        .card-act{display:flex;gap:7px;align-items:center}
        .swrap{position:relative}
        .swrap input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 11px 7px 30px;font-family:inherit;font-size:13px;color:var(--text);outline:none;width:190px;transition:border-color .15s}
        .swrap input:focus{border-color:var(--accent)}
        .swrap input::placeholder{color:var(--muted)}
        .swrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--muted);pointer-events:none}

        table{width:100%;border-collapse:collapse}
        thead tr{border-bottom:1px solid var(--border)}
        th{padding:10px 15px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
        tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
        tbody tr:last-child{border-bottom:none}
        tbody tr:hover{background:#fafbfc}
        td{padding:11px 15px;font-size:13px}
        .vno{font-weight:700}
        .mm{color:var(--muted)}

        .badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600}
        .bpri{background:#eff6ff;color:#2563eb}
        .bcom{background:#fffbeb;color:#d97706}
        .bgov{background:#f0fdf4;color:#16a34a}
        .bcar{background:#f1f5f9;color:#475569}
        .bvan{background:#faf5ff;color:#7c3aed}
        .btruck{background:#fff7ed;color:#ea580c}
        .bmoto{background:#fdf2f8;color:#be185d}
        .bbus{background:#ecfdf5;color:#059669}

        .empty{text-align:center;padding:44px 20px;color:var(--muted)}
        .empty svg{width:32px;height:32px;margin:0 auto 8px;display:block;opacity:.35}
        .empty p{font-size:13px}

        /* Modal */
        .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center}
        .ov.open{display:flex}
        .modal{background:var(--white);border-radius:12px;padding:26px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;animation:pop .2s ease}
        @keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
        .mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .mtitle{font-size:15px;font-weight:700}
        .mclose{background:none;border:none;cursor:pointer;color:var(--muted);padding:3px;border-radius:6px;display:flex;transition:background .15s}.mclose:hover{background:var(--bg)}
        .mclose svg{width:17px;height:17px}
        .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .fg{display:flex;flex-direction:column;gap:5px}
        .fg.s2{grid-column:span 2}
        .fg label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
        .fg input,.fg select{padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);background:var(--white);outline:none;transition:border-color .15s}
        .fg input:focus,.fg select:focus{border-color:var(--accent)}
        .fg input::placeholder{color:var(--muted)}
        .mft{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

        .cmod{max-width:320px;text-align:center}
        .cico{font-size:34px;margin-bottom:8px}
        .ctitle{font-size:15px;font-weight:700;margin-bottom:5px}
        .cmsg{font-size:13px;color:var(--muted);margin-bottom:20px}
        .cbtns{display:flex;gap:8px;justify-content:center}
        .bdd{background:var(--red);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}.bdd:hover{background:#dc2626}

        .toast{position:fixed;bottom:18px;right:18px;color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;transform:translateY(6px);opacity:0;transition:all .22s;pointer-events:none;z-index:999;box-shadow:0 4px 14px rgba(0,0,0,.18)}
        .toast.show{transform:translateY(0);opacity:1}
        .toast.ok{background:var(--green)}.toast.err{background:var(--red)}
        .toast svg{width:14px;height:14px;flex-shrink:0}
    </style>
</head>
<body>
<div class="layout">

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-ico">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
            </div>
            <span class="logo-txt">VehicleMS</span>
        </div>
        <button class="nav on">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
        </button>
        <button class="nav">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
            Vehicles
        </button>
        <div class="sb-bot">
            <div class="urow">
                <div class="ava">A</div>
                <div><div class="uname">Admin</div><div class="urole">Administrator</div></div>
            </div>
            <button class="logout" onclick="doLogout()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </button>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <span class="ptitle">Dashboard</span>
            <div class="tright">
                <button class="btn bo" onclick="fetchAll()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Refresh
                </button>
                <button class="btn bp" onclick="openAdd()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Vehicle
                </button>
            </div>
        </div>

        <div class="content">
            <div class="stats">
                <div class="stat blue"><div class="slbl">Total</div><div class="sval" id="s0">0</div><div class="ssub">Vehicles</div></div>
                <div class="stat grn"><div class="slbl">Private</div><div class="sval" id="s1">0</div><div class="ssub">Usage</div></div>
                <div class="stat amb"><div class="slbl">Commercial</div><div class="sval" id="s2">0</div><div class="ssub">Usage</div></div>
                <div class="stat red"><div class="slbl">Government</div><div class="sval" id="s3">0</div><div class="ssub">Usage</div></div>
            </div>

            <div class="card">
                <div class="card-hd">
                    <span class="card-title">All Vehicles</span>
                    <div class="card-act">
                        <div class="swrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="srch" placeholder="Search…" oninput="filter()"/>
                        </div>
                        <button class="btn bo bsm" style="color:var(--red)" onclick="confirmReset()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                            Reset All
                        </button>
                    </div>
                </div>
                <table>
                    <thead><tr>
                        <th>Vehicle No.</th><th>Make & Model</th><th>Type</th>
                        <th>Year</th><th>Market Value</th><th>Usage</th><th>Actions</th>
                    </tr></thead>
                    <tbody id="tb"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Vehicle Modal -->
<div class="ov" id="vm">
    <div class="modal">
        <div class="mhd">
            <span class="mtitle" id="mt">Add Vehicle</span>
            <button class="mclose" onclick="cls('vm')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="fgrid">
            <div class="fg"><label>Vehicle Number *</label><input id="fn" placeholder="e.g. CAB-1234"/></div>
            <div class="fg"><label>Make *</label><input id="fmk" placeholder="e.g. Toyota"/></div>
            <div class="fg"><label>Model *</label><input id="fmd" placeholder="e.g. Corolla"/></div>
            <div class="fg"><label>Type *</label>
                <select id="ft"><option value="">Select…</option><option>CAR</option><option>VAN</option><option>TRUCK</option><option>MOTORCYCLE</option><option>BUS</option></select>
            </div>
            <div class="fg"><label>Year *</label><input id="fy" type="number" placeholder="2020" min="1990" max="2025"/></div>
            <div class="fg"><label>Market Value (LKR) *</label><input id="fv" type="number" placeholder="5000000"/></div>
            <div class="fg s2"><label>Usage *</label>
                <select id="fu"><option value="">Select…</option><option>PRIVATE</option><option>COMMERCIAL</option><option>GOVERNMENT</option></select>
            </div>
        </div>
        <div class="mft">
            <button class="btn bo" onclick="cls('vm')">Cancel</button>
            <button class="btn bp" id="ms" onclick="save()">Save Vehicle</button>
        </div>
    </div>
</div>

<!-- Confirm Modal -->
<div class="ov" id="cm">
    <div class="modal cmod">
        <div class="cico" id="ci">🗑️</div>
        <div class="ctitle" id="ctitle">Delete Vehicle?</div>
        <div class="cmsg" id="cmsg">This cannot be undone.</div>
        <div class="cbtns">
            <button class="btn bo" onclick="cls('cm')">Cancel</button>
            <button class="bdd" id="cact">Delete</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">
    <svg id="tico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"></svg>
    <span id="tmsg"></span>
</div>

<script>
    const API='http://localhost:8080/api/v1/vehicle';
    let data=[],em=false,en=null;

    fetchAll();

    async function fetchAll(){
        try{
            const r=await fetch(`${API}/all`);
            const d=await r.json();
            data=d.data||[];render(data);upStats(data);
        }catch{toast('Cannot connect to server',false);empty();}
    }

    function render(list){
        if(!list.length){empty();return;}
        const typeBadge=t=>{const m={'CAR':'bcar','VAN':'bvan','TRUCK':'btruck','MOTORCYCLE':'bmoto','BUS':'bbus'};return`<span class="badge ${m[t]||'bcar'}">${t}</span>`};
        const useBadge=u=>{const m={'PRIVATE':'bpri','COMMERCIAL':'bcom','GOVERNMENT':'bgov'};return`<span class="badge ${m[u]||'bpri'}">${u}</span>`};
        document.getElementById('tb').innerHTML=list.map(v=>`
    <tr>
      <td><span class="vno">${v.vehicleNumber}</span></td>
      <td>${v.make} <span class="mm">${v.model}</span></td>
      <td>${typeBadge(v.vehicleType)}</td>
      <td>${v.manufacturedYear}</td>
      <td>LKR ${Number(v.marketValue).toLocaleString()}</td>
      <td>${useBadge(v.usageType)}</td>
      <td style="display:flex;gap:5px">
        <button class="be" onclick="openEdit('${v.vehicleNumber}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit
        </button>
        <button class="bd" onclick="confirmDel('${v.vehicleNumber}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Delete
        </button>
      </td>
    </tr>`).join('');
    }

    function empty(){
        document.getElementById('tb').innerHTML=`<tr><td colspan="7"><div class="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
    <p>No vehicles found</p></div></td></tr>`;
    }

    function upStats(list){
        document.getElementById('s0').textContent=list.length;
        document.getElementById('s1').textContent=list.filter(v=>v.usageType==='PRIVATE').length;
        document.getElementById('s2').textContent=list.filter(v=>v.usageType==='COMMERCIAL').length;
        document.getElementById('s3').textContent=list.filter(v=>v.usageType==='GOVERNMENT').length;
    }

    function filter(){
        const q=document.getElementById('srch').value.toLowerCase();
        render(data.filter(v=>v.vehicleNumber?.toLowerCase().includes(q)||v.make?.toLowerCase().includes(q)||v.model?.toLowerCase().includes(q)));
    }

    function openAdd(){
        em=false;en=null;clearF();
        document.getElementById('mt').textContent='Add Vehicle';
        document.getElementById('ms').textContent='Save Vehicle';
        document.getElementById('fn').disabled=false;
        document.getElementById('vm').classList.add('open');
    }

    function openEdit(num){
        const v=data.find(x=>x.vehicleNumber===num);if(!v)return;
        em=true;en=num;
        document.getElementById('fn').value=v.vehicleNumber;
        document.getElementById('fmk').value=v.make;
        document.getElementById('fmd').value=v.model;
        document.getElementById('ft').value=v.vehicleType;
        document.getElementById('fy').value=v.manufacturedYear;
        document.getElementById('fv').value=v.marketValue;
        document.getElementById('fu').value=v.usageType;
        document.getElementById('fn').disabled=true;
        document.getElementById('mt').textContent='Edit Vehicle';
        document.getElementById('ms').textContent='Update';
        document.getElementById('vm').classList.add('open');
    }

    async function save(){
        const dto={vehicleNumber:document.getElementById('fn').value.trim(),make:document.getElementById('fmk').value.trim(),model:document.getElementById('fmd').value.trim(),vehicleType:document.getElementById('ft').value,manufacturedYear:+document.getElementById('fy').value,marketValue:+document.getElementById('fv').value,usageType:document.getElementById('fu').value};
        if(Object.values(dto).some(v=>!v)){toast('Fill all fields',false);return;}
        try{
            const r=em?await fetch(`${API}/update/${en}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(dto)}):await fetch(`${API}/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(dto)});
            const d=await r.json();
            if(r.ok){toast(em?'Updated!':'Vehicle added!',true);cls('vm');fetchAll();}
            else toast(d.message||'Error',false);
        }catch{toast('Server error',false);}
    }

    function confirmDel(num){
        document.getElementById('ci').textContent='🗑️';
        document.getElementById('ctitle').textContent='Delete Vehicle?';
        document.getElementById('cmsg').textContent=`"${num}" will be removed.`;
        document.getElementById('cact').textContent='Delete';
        document.getElementById('cact').style.background='var(--red)';
        document.getElementById('cact').onclick=()=>doDel(num);
        document.getElementById('cm').classList.add('open');
    }
    async function doDel(num){
        try{const r=await fetch(`${API}/delete/${num}`,{method:'DELETE'});cls('cm');if(r.ok){toast('Deleted',true);fetchAll();}else toast('Failed',false);}
        catch{toast('Server error',false);}
    }

    function confirmReset(){
        document.getElementById('ci').textContent='⚠️';
        document.getElementById('ctitle').textContent='Reset All?';
        document.getElementById('cmsg').textContent='All vehicles will be permanently deleted.';
        document.getElementById('cact').textContent='Reset All';
        document.getElementById('cact').style.background='var(--red)';
        document.getElementById('cact').onclick=doReset;
        document.getElementById('cm').classList.add('open');
    }
    async function doReset(){
        try{const r=await fetch(`${API}/reset`,{method:'DELETE'});cls('cm');if(r.ok){toast('All cleared',true);fetchAll();}else toast('Failed',false);}
        catch{toast('Server error',false);}
    }

    function doLogout(){
        document.getElementById('ci').textContent='👋';
        document.getElementById('ctitle').textContent='Logout?';
        document.getElementById('cmsg').textContent='You will return to the login page.';
        document.getElementById('cact').textContent='Logout';
        document.getElementById('cact').style.background='#374151';
        document.getElementById('cact').onclick=()=>location.href='login.html';
        document.getElementById('cm').classList.add('open');
    }

    function cls(id){document.getElementById(id).classList.remove('open');}
    function clearF(){['fn','fmk','fmd','fy','fv'].forEach(i=>document.getElementById(i).value='');['ft','fu'].forEach(i=>document.getElementById(i).value='');}

    let tt;
    function toast(msg,ok){
        const el=document.getElementById('toast');
        document.getElementById('tmsg').textContent=msg;
        document.getElementById('tico').innerHTML=ok?'<polyline points="20 6 9 17 4 12"/>':'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
        el.className=`toast show ${ok?'ok':'err'}`;
        clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2800);
    }
    document.querySelectorAll('.ov').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
</script>

<script src="js/jquery-3.7.1.min.js"></script>
